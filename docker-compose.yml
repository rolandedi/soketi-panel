name: soketi-stack

services:
  # ──────────────────────────────────────────────
  # Nuxt Application
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soketi-panel
    restart: unless-stopped
    ports:
      - "4931:3000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_URL: http://localhost:4931
      BETTER_AUTH_URL: http://localhost:4931
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-supersecretkey}
      DB_DRIVER: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: soketi
      DB_USER: soketi
      DB_PASSWORD: ${DB_PASSWORD:-soketi_password}
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      SOKETI_HOST: soketi
      SOKETI_PORT: 6001
      SOKETI_METRICS_HOST: soketi
      SOKETI_METRICS_PORT: 9601
      SOKETI_METRICS_SCHEME: ${SOKETI_METRICS_SCHEME:-http}
      SOKETI_PANEL_EMAIL: ${SOKETI_PANEL_EMAIL:-"admin@soketi-panel.app"}
      SOKETI_PANEL_PASSWORD: ${SOKETI_PANEL_PASSWORD:-"Password123"}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soketi-network

  # ──────────────────────────────────────────────
  # MariaDB Database
  # ──────────────────────────────────────────────
  mariadb:
    image: mariadb:11.8
    container_name: soketi-mariadb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MARIADB_DATABASE: soketi
      MARIADB_USER: soketi
      MARIADB_PASSWORD: ${DB_PASSWORD:-soketi_password}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soketi-network

  # ──────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: soketi-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    networks:
      - soketi-network
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:-redis_password}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Soketi (WebSocket Server)
  # ──────────────────────────────────────────────
  soketi:
    image: quay.io/soketi/soketi:latest
    container_name: soketi-server
    restart: unless-stopped
    ports:
      - "6001:6001"
    env_file:
      - .env
    environment:
      SOKETI_DEBUG: 0
      SOKETI_METRICS_ENABLED: 1
      SOKETI_METRICS_SERVER_PORT: ${SOKETI_METRICS_PORT:-9601}
      SOKETI_APP_MANAGER_DRIVER: "mysql"
      SOKETI_APP_MANAGER_MYSQL_TABLE: sktp_applications # Don't change
      SOKETI_DB_MYSQL_HOST: mariadb
      SOKETI_DB_MYSQL_PORT: 3306
      SOKETI_DB_MYSQL_DATABASE: soketi
      SOKETI_DB_MYSQL_USERNAME: soketi
      SOKETI_DB_MYSQL_PASSWORD: ${DB_PASSWORD:-soketi_password}
      SOKETI_DB_REDIS_HOST: redis
      SOKETI_DB_REDIS_PORT: 6379
      SOKETI_DB_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      SOKETI_DB_REDIS_DB: 4
      SOKETI_DB_REDIS_KEY_PREFIX: "soketi:"
      SOKETI_RATE_LIMITER_DRIVER: "redis"
      SOKETI_CACHE_DRIVER: "redis"
    networks:
      - soketi-network
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

# ──────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────
volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local

# ──────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────
networks:
  soketi-network:
    driver: bridge
