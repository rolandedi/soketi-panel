name: soketi-stack

services:
  # ──────────────────────────────────────────────
  # Nuxt Application
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soketi-panel
    restart: unless-stopped
    ports:
      - "4931:3000"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_URL: http://localhost:4931
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-(openssl rand -base64 32)}
      BETTER_AUTH_URL: http://localhost:4931
      DB_DRIVER: ${DB_DRIVER:-mysql}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-soketi}
      DB_USER: ${DB_USER:-soketi}
      DB_PASSWORD: ${DB_PASSWORD:-soketi_password}
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      SOKETI_HOST: soketi
      SOKETI_PORT: 6001
      SOKETI_METRICS_HOST: soketi
      SOKETI_METRICS_PORT: 9601
      SOKETI_PANEL_EMAIL: ${SOKETI_PANEL_EMAIL:-admin@soketi-panel.app}
      SOKETI_PANEL_PASSWORD: ${SOKETI_PANEL_PASSWORD:-adminpassword}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-redis_password}@redis:6379}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
      soketi:
        condition: service_started
    networks:
      - soketi-network

  # ──────────────────────────────────────────────
  # MariaDB Database
  # ──────────────────────────────────────────────
  mariadb:
    image: mariadb:11.8
    container_name: soketi-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: soketi
      MARIADB_USER: soketi
      MARIADB_PASSWORD: soketi_password
      MARIADB_ROOT_PASSWORD: rootpassword
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soketi-network

  # ──────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: soketi-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    networks:
      - soketi-network

  # ──────────────────────────────────────────────
  # Soketi (WebSocket Server)
  # ──────────────────────────────────────────────
  soketi:
    image: quay.io/soketi/soketi:latest
    container_name: soketi-server
    restart: unless-stopped
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_METRICS_PORT: 9601
      SOKETI_METRICS_ENABLED: "1"
      SOKETI_APP_MANAGER_DRIVER: "mysql"
      SOKETI_APP_MANAGER_MYSQL_TABLE: "sktp_applications"
      SOKETI_DB_MYSQL_HOST: mariadb
      SOKETI_DB_MYSQL_PORT: 3306
      SOKETI_DB_MYSQL_DATABASE: soketi
      SOKETI_DB_MYSQL_USERNAME: soketi
      SOKETI_DB_MYSQL_PASSWORD: soketi_password
      SOKETI_DB_REDIS_HOST: redis
      SOKETI_DB_REDIS_PORT: 6379
      SOKETI_DB_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      SOKETI_DB_REDIS_DB: 4
      SOKETI_DB_REDIS_KEY_PREFIX: "soketi:"
      SOKETI_RATE_LIMITER_DRIVER: "redis"
      SOKETI_CACHE_DRIVER: "redis"
    networks:
      - soketi-network

# ──────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────
volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local

# ──────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────
networks:
  soketi-network:
    driver: bridge
